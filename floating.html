<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="stylesheet" href="floating.css" />
</head>
<body>
  <div class="camera-container" id="camera-container">
    <div class="camera-feed-wrapper">
      <video id="camera-feed" autoplay playsinline muted></video>
      <div id="countdown" class="countdown hidden">3</div>
    </div>
  </div>

  <div class="device-selectors" id="device-selectors">
    <div class="select-row">
      <span class="select-icon">🎥</span>
      <select id="video-select"></select>
    </div>
    <div class="select-row">
      <span class="select-icon">🎙</span>
      <select id="audio-select"></select>
    </div>
  </div>

  <div class="controls-container">
    <button id="start-btn" class="primary">▶ Start</button>
    <button id="restart-btn" class="ghost hidden">↺ Restart</button>
    <button id="stop-btn" class="danger hidden">■ Stop</button>
  </div>

  <script type="module" src="floating.js"></script>
</body>
</html>
